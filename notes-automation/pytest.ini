[pytest]

pythonpath=.
addopts =
    -v
    --html=reports/report.html
    --self-contained-html
    --reruns 1
    --reruns-delay 2

testpaths = tests

python_files = test_*.py

python_classes = Test*

python_functions = test_*

markers =
    ui: UI tests
    api: API tests
    e2e: End-to-end tests